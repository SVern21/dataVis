<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <circle cx="16" cy="16" r="16" fill="#0d0d0d"/>
  <!-- Vinyl grooves -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="#1f1f1f" stroke-width="1"/>
  <circle cx="16" cy="16" r="12" fill="none" stroke="#1f1f1f" stroke-width="0.8"/>
  <circle cx="16" cy="16" r="10" fill="none" stroke="#222" stroke-width="0.8"/>
  <circle cx="16" cy="16" r="8"  fill="none" stroke="#222" stroke-width="0.8"/>
  <circle cx="16" cy="16" r="6"  fill="none" stroke="#252525" stroke-width="0.8"/>
  <!-- Label area -->
  <circle cx="16" cy="16" r="5" fill="#c8f135"/>
